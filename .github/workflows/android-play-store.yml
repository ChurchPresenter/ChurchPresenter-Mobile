name: Android Play Store Upload

# Builds a signed AAB and uploads it directly to Google Play Store.
# Requires the GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret — see PLAY_STORE.md Step 8
# for how to create and configure the service account.
#
# Required secrets (same as Android Release Build, plus the Play service account):
#   ANDROID_KEYSTORE_BASE64, ANDROID_STORE_PASSWORD, ANDROID_KEY_ALIAS,
#   ANDROID_KEY_PASSWORD, GOOGLE_SERVICES_JSON_BASE64,
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON

on:
  workflow_dispatch:
    inputs:
      track:
        description: Play Store release track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      rollout_percentage:
        description: "Production rollout % (only used when track = production)"
        required: false
        default: "20"

# Opt into Node.js 24 now — Node.js 20 actions are deprecated (forced June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-upload:
    name: Build AAB & Upload to Play Store
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64:              ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD:               ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS:                    ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:                 ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64:          ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:     ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          missing=()
          [ -z "$ANDROID_KEYSTORE_BASE64"          ] && missing+=("ANDROID_KEYSTORE_BASE64")
          [ -z "$ANDROID_STORE_PASSWORD"           ] && missing+=("ANDROID_STORE_PASSWORD")
          [ -z "$ANDROID_KEY_ALIAS"                ] && missing+=("ANDROID_KEY_ALIAS")
          [ -z "$ANDROID_KEY_PASSWORD"             ] && missing+=("ANDROID_KEY_PASSWORD")
          [ -z "$GOOGLE_SERVICES_JSON_BASE64"      ] && missing+=("GOOGLE_SERVICES_JSON_BASE64")
          [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ] && missing+=("GOOGLE_PLAY_SERVICE_ACCOUNT_JSON")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ The following required GitHub secrets are not set:"
            for s in "${missing[@]}"; do echo "   • $s"; done
            echo ""
            echo "👉 See PLAY_STORE.md Step 8 for service account setup instructions."
            exit 1
          fi
          echo "✅ All required secrets are present."

      - name: Decode Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '\r\n' | base64 -d > /tmp/release.keystore
          test -s /tmp/release.keystore || {
            echo "❌ /tmp/release.keystore is empty after decode."
            echo "   Re-encode with: base64 -b 0 -i release.keystore | pbcopy"
            exit 1
          }

      - name: Create signing configuration
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p /tmp/signing
          cp /tmp/release.keystore /tmp/signing/release.keystore
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > /tmp/signing/signing.properties

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GS_B64" | tr -d '\r\n' | base64 -d > composeApp/google-services.json
          test -s composeApp/google-services.json || {
            echo "❌ google-services.json is empty after decode" >&2; exit 1
          }

      - name: Build release AAB
        run: ./gradlew :composeApp:bundleRelease
        env:
          SIGNING_REPO_PATH: /tmp/signing

      - name: Write Play Store service account key
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > /tmp/play-service-account.json
          test -s /tmp/play-service-account.json || {
            echo "❌ Service account key is empty" >&2; exit 1
          }

      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson:       /tmp/play-service-account.json
          packageName:              com.church.presenter.churchpresentermobile
          releaseFiles:             composeApp/build/outputs/bundle/release/*.aab
          track:                    ${{ inputs.track }}
          status:                   ${{ (inputs.track == 'production' && inputs.rollout_percentage != '100') && 'inProgress' || 'completed' }}
          userFraction:             ${{ inputs.track == 'production' && inputs.rollout_percentage != '100' && format('0.{0}', inputs.rollout_percentage) || '' }}
          inAppUpdatePriority:      2
          releaseName:              ${{ github.run_number }}

      - name: Also upload AAB as artifact (for manual backup)
        uses: actions/upload-artifact@v4
        with:
          name: play-store-aab-${{ github.run_number }}
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Play Store Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Track | \`${{ inputs.track }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | \`com.church.presenter.churchpresentermobile\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** Go to [Play Console](https://play.google.com/console) → Release → ${{ inputs.track }} to review and promote the release." >> $GITHUB_STEP_SUMMARY

