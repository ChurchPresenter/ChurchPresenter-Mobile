name: Android Release Build

# Manually triggered from the GitHub Actions tab.
# Generates a signed APK or AAB and uploads it as a workflow artifact.
# Required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_STORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD, GOOGLE_SERVICES_JSON_BASE64
# See GITHUB_SECRETS_SETUP.md for encoding instructions (always use -b 0).

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Output format
        required: true
        default: aab
        type: choice
        options:
          - aab
          - apk

# Opt into Node.js 24 now — Node.js 20 actions are deprecated (forced June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Signed Android Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Fail fast with an actionable message if any required secret is missing.
      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64:        ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD:         ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS:              ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:           ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64:    ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          missing=()
          [ -z "$ANDROID_KEYSTORE_BASE64"     ] && missing+=("ANDROID_KEYSTORE_BASE64")
          [ -z "$ANDROID_STORE_PASSWORD"      ] && missing+=("ANDROID_STORE_PASSWORD")
          [ -z "$ANDROID_KEY_ALIAS"           ] && missing+=("ANDROID_KEY_ALIAS")
          [ -z "$ANDROID_KEY_PASSWORD"        ] && missing+=("ANDROID_KEY_PASSWORD")
          [ -z "$GOOGLE_SERVICES_JSON_BASE64" ] && missing+=("GOOGLE_SERVICES_JSON_BASE64")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ The following required GitHub secrets are not set:"
            for s in "${missing[@]}"; do echo "   • $s"; done
            echo ""
            echo "👉 See GITHUB_SECRETS_SETUP.md for encoding instructions."
            echo "   Add secrets at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✅ All required secrets are present."

      # Pass secrets through env: so the shell never expands them inline.
      # tr -d removes CR+LF that macOS base64 (without -b 0) may embed.
      # test -s fails loudly if the file is empty, before Gradle ever runs.
      - name: Decode Android keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '\r\n' | base64 -d > /tmp/release.keystore
          test -s /tmp/release.keystore || {
            echo "❌ /tmp/release.keystore is empty after decode."
            echo "   The ANDROID_KEYSTORE_BASE64 secret may be corrupted."
            echo "   Re-encode with:  base64 -b 0 -i release.keystore | pbcopy"
            echo "   (use -b 0 on macOS to disable line-wrapping)"
            exit 1
          }

      - name: Create signing configuration
        run: |
          mkdir -p /tmp/signing
          cp /tmp/release.keystore /tmp/signing/release.keystore
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > /tmp/signing/signing.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GS_B64" | tr -d '\r\n' | base64 -d > composeApp/google-services.json
          test -s composeApp/google-services.json || { echo "ERROR: composeApp/google-services.json is empty after decode" >&2; exit 1; }

      - name: Build release AAB
        if: ${{ inputs.build_type == 'aab' }}
        run: ./gradlew :composeApp:bundleRelease
        env:
          SIGNING_REPO_PATH: /tmp/signing

      - name: Build release APK
        if: ${{ inputs.build_type == 'apk' }}
        run: ./gradlew :composeApp:assembleRelease
        env:
          SIGNING_REPO_PATH: /tmp/signing

      - name: Upload AAB
        if: ${{ inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.run_number }}
          path: composeApp/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK
        if: ${{ inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 30
