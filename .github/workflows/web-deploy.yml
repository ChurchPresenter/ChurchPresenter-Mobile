name: Web Build

# Builds the WasmJS Compose-for-Web bundle and uploads it as a zip artifact.
# Download the artifact from the Actions tab, unzip it, then run:
#   python3 -m http.server 8080   (or: npx serve .)
# and open http://localhost:8080 in your browser.
#
# NOTE: Opening index.html directly (file://) will NOT work — browsers block
#       .wasm loading over the file:// protocol.

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build WasmJS Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GS_B64" | tr -d '\r\n' | base64 -d > composeApp/google-services.json
          test -s composeApp/google-services.json || {
            echo "ERROR: composeApp/google-services.json is empty after decode" >&2
            exit 1
          }

      - name: Build WasmJS production distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Upload web distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.run_number }}
          path: composeApp/build/dist/wasmJs/productionExecutable
          retention-days: 30
